<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>Pong — Simple Game</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <div class="container">
    <h1>Simple Pong</h1>
    <div class="game-wrap">
      <canvas id="game" width="800" height="500"></canvas>
      <div class="scoreboard">
        <div id="playerScore" class="score">0</div>
        <div class="score-sep">&nbsp;:&nbsp;</div>
        <div id="computerScore" class="score">0</div>
      </div>
      <div class="hint">Move left paddle with mouse or Arrow Up / Arrow Down</div>
    </div>
    <div class="footer">Press Space to pause / resume</div>
  </div>

  <script src="script.js"></script>
</body>
</html>
